<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Gallery - OpenFront Map Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .gallery-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    .gallery-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
      border-color: var(--accent);
    }
    .gallery-card-image-wrap {
      position: relative;
      width: 100%;
      height: 200px;
      background: var(--surface2);
      overflow: hidden;
    }
    .gallery-card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
    }
    .gallery-card-body {
      padding: 16px;
    }
    .gallery-card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .gallery-card-meta {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .gallery-card-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-top: 8px;
    }
    .gallery-filter {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      max-width: 1400px;
      margin: 0 auto;
    }
    .gallery-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .toggle-switch.active {
      background: var(--accent);
      border-color: var(--accent);
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: var(--text);
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch.active::after {
      transform: translateX(20px);
    }
    .gallery-nation-marker {
      position: absolute;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-text">
      <h1>Map Gallery</h1>
      <p>Browse community-created maps for <a href="https://openfront.io" target="_blank" rel="noopener">openfront.io</a></p>
    </div>
    <div style="display:flex;gap:12px;">
      <a href="index.html" class="btn btn-ghost">← Back to Generator</a>
    </div>
  </div>

  <div class="gallery-filter">
    <span id="galleryCount" style="font-size:0.85rem;color:var(--muted);"></span>
  </div>

  <div id="galleryGrid" class="gallery-grid">
    <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);">
      Loading gallery...
    </div>
  </div>
</div>

<!-- Map detail modal -->
<div class="modal-overlay" id="mapDetailModal">
  <div class="modal" style="width:100vw;height:100vh;max-height:100vh;border-radius:0;border:none;display:flex;flex-direction:column;">
    <div class="modal-header">
      <span class="modal-title" id="detailTitle">Map Details</span>
      <button class="modal-close" id="detailClose">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div style="flex:1;overflow-y:auto;display:flex;gap:24px;padding:24px;min-height:0;">
      <!-- Map image with nations -->
      <div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-width:0;">
        <div id="detailMapWrap" style="position:relative;display:inline-block;">
          <img id="detailImage" style="max-width:100%;max-height:calc(100vh - 200px);border-radius:8px;image-rendering:pixelated;" />
        </div>
      </div>
      <!-- Map info panel -->
      <div style="width:320px;flex-shrink:0;display:flex;flex-direction:column;gap:16px;">
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;">
          <div style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:12px;">Map Info</div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <div style="display:flex;justify-content:space-between;font-size:0.85rem;">
              <span style="color:var(--muted);">Author</span>
              <span style="color:var(--text);font-weight:500;" id="detailAuthor">-</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:0.85rem;">
              <span style="color:var(--muted);">Size</span>
              <span style="color:var(--text);" id="detailSize">-</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:0.85rem;">
              <span style="color:var(--muted);">Nations</span>
              <span style="color:var(--text);" id="detailNationsCount">-</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:0.85rem;">
              <span style="color:var(--muted);">Created</span>
              <span style="color:var(--text);" id="detailDate">-</span>
            </div>
          </div>
        </div>
        <!-- Show nations toggle -->
        <div id="showNationsToggleWrap" style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;display:none;">
          <label style="display:flex;align-items:center;gap:10px;font-size:0.85rem;color:var(--text);cursor:pointer;">
            <div class="toggle-switch active" id="detailShowNations"></div>
            <span>Show nations on map</span>
          </label>
        </div>
        <div id="detailDescWrap" style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;display:none;">
          <div style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;">Description</div>
          <div id="detailDesc" style="font-size:0.85rem;color:var(--text);line-height:1.6;"></div>
        </div>
        <div id="detailNationsListWrap" style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;display:none;">
          <div style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:12px;">Nations</div>
          <div id="detailNationsList" style="display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;"></div>
        </div>
        <div style="flex:1"></div>
        <button class="btn btn-primary" id="detailDownloadBtn" style="font-size:0.85rem;padding:12px 20px;width:100%;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download Map Package
        </button>
      </div>
    </div>
    <div class="modal-footer" style="padding:16px 24px;border-top:1px solid var(--border);">
      <button class="btn btn-ghost" id="detailClose2" style="font-size:0.85rem;padding:8px 16px;">Close</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const API_URL = window.location.hostname === 'localhost' 
  ? 'http://localhost:3002/api'
  : window.location.protocol + '//' + window.location.hostname + '/api';

const FLAG_BASE = 'https://raw.githubusercontent.com/openfrontio/OpenFrontIO/main/resources/flags/';

const galleryGrid = document.getElementById('galleryGrid');
const galleryCount = document.getElementById('galleryCount');
const mapDetailModal = document.getElementById('mapDetailModal');
const detailClose = document.getElementById('detailClose');
const detailClose2 = document.getElementById('detailClose2');
const detailDownloadBtn = document.getElementById('detailDownloadBtn');
const detailShowNations = document.getElementById('detailShowNations');
const showNationsToggleWrap = document.getElementById('showNationsToggleWrap');

let currentDetailMap = null;
let showNationsOnMap = true;

function flagUrl(code) { return code ? FLAG_BASE + encodeURIComponent(code) + '.svg' : ''; }

function showOsPickerAndDownload(map) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);';
  overlay.innerHTML = '<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 28px 24px;max-width:420px;width:92%;box-shadow:0 24px 64px rgba(0,0,0,0.6);">' +
    '<div style="font-size:1.05rem;font-weight:600;margin-bottom:6px;color:var(--text);">Download map archive</div>' +
    '<div style="font-size:0.8rem;color:var(--muted);margin-bottom:24px;line-height:1.6;">The archive includes <code style="background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:0.78rem;">image.png</code> and <code style="background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:0.78rem;">info.json</code> map files.</div>' +
    '<div style="font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:10px;">Choose your OS</div>' +
    '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;">' +
      '<button id="osMac" style="display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;cursor:pointer;text-align:left;transition:border-color 0.15s;">' +
        '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0;color:var(--text);"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>' +
        '<div><div style="font-size:0.88rem;font-weight:500;color:var(--text);">macOS</div></div>' +
      '</button>' +
      '<button id="osWin" style="display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;cursor:pointer;text-align:left;transition:border-color 0.15s;">' +
        '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0;color:var(--text);"><path d="M3 12V6.75l6-1.32v6.57H3zm17 0V3l-9 1.68V12h9zm-17 1h6v6.57L3 18.25V13zm17 0h-9v7.32L20 22V13z"/></svg>' +
        '<div><div style="font-size:0.88rem;font-weight:500;color:var(--text);">Windows</div></div>' +
      '</button>' +
      '<button id="osLinux" style="display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;cursor:pointer;text-align:left;transition:border-color 0.15s;">' +
        '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0;color:var(--text);"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16z"/></svg>' +
        '<div><div style="font-size:0.88rem;font-weight:500;color:var(--text);">Linux</div></div>' +
      '</button>' +
    '</div>' +
    '<div style="border-top:1px solid var(--border);padding-top:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;">' +
      '<button id="osArchiveOnly" class="btn btn-ghost" style="font-size:0.8rem;padding:8px 14px;">Map files only</button>' +
      '<button id="osCancel" class="btn btn-ghost" style="font-size:0.8rem;padding:8px 14px;">Cancel</button>' +
    '</div>' +
  '</div>';
  document.body.appendChild(overlay);

  overlay.querySelector('#osCancel').onclick = function() { overlay.remove(); };
  var pick = function(os) { overlay.remove(); buildGalleryArchive(map, os); };
  overlay.querySelector('#osMac').onclick = function() { pick('mac'); };
  overlay.querySelector('#osWin').onclick = function() { pick('win'); };
  overlay.querySelector('#osLinux').onclick = function() { pick('linux'); };
  overlay.querySelector('#osArchiveOnly').onclick = function() { overlay.remove(); buildGalleryArchive(map, null); };
  ['osMac','osWin','osLinux'].forEach(function(id) {
    var btn = overlay.querySelector('#' + id);
    btn.addEventListener('mouseenter', function() { btn.style.borderColor = 'var(--accent)'; });
    btn.addEventListener('mouseleave', function() { btn.style.borderColor = 'var(--border)'; });
  });
}

async function buildGalleryArchive(map, os) {
  var zip = new JSZip();
  var imgResp = await fetch(map.sourceUrl);
  if (!imgResp.ok) { alert('Failed to download map image'); return; }
  var imgBlob = await imgResp.blob();
  zip.file('image.png', imgBlob, { binary: true });

  var manifest = {
    name: map.name,
    map: { width: map.dimensions.width, height: map.dimensions.height, num_land_tiles: 0 },
    nations: (map.nationsData || []).map(function(n) { return { name: n.name, spawn: { x: n.x, y: n.y }, flag: n.flag || null }; })
  };
  zip.file('info.json', JSON.stringify(manifest, null, 2));

  if (os) {
    var setupResp = await fetch('map-test-kit/setup.py');
    zip.file('setup.py', await setupResp.text());
    if (os === 'win') {
      zip.file('Click me to install.bat', await (await fetch('map-test-kit/run.bat')).text());
    } else if (os === 'mac') {
      zip.file('Click me to install.command', await (await fetch('map-test-kit/run.command')).text(), { unixPermissions: '755' });
    } else {
      zip.file('Click me to install.sh', '#!/bin/bash\ncd "$(dirname "$0")"\npython3 setup.py\n', { unixPermissions: '755' });
    }
  }

  var blob = await zip.generateAsync({ type: 'blob', platform: 'UNIX' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = map.name.replace(/[^a-z0-9]+/gi, '-') + '.zip';
  a.click();
  URL.revokeObjectURL(a.href);
}

var allMaps = [];

async function loadGallery() {
  try {
    var response = await fetch(API_URL + '/maps');
    var data = await response.json();
    allMaps = (data.maps || []).map(function(map) {
      return Object.assign({}, map, {
        folder: map.id,
        thumbnailUrl: 'https://raw.githubusercontent.com/baculinivan-web/OFmapGen/dev/' + map.thumbnail,
        fullUrl: 'https://raw.githubusercontent.com/baculinivan-web/OFmapGen/dev/' + map.full,
        sourceUrl: map.source ? 'https://raw.githubusercontent.com/baculinivan-web/OFmapGen/dev/' + map.source : 'https://raw.githubusercontent.com/baculinivan-web/OFmapGen/dev/' + map.full
      });
    });
    renderGallery();
  } catch (error) {
    console.error('Failed to load gallery:', error);
    galleryGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);"><p>Failed to load gallery</p><p style="font-size:0.8rem;margin-top:8px;">' + error.message + '</p></div>';
  }
}

function renderGallery() {
  galleryCount.textContent = allMaps.length + ' map' + (allMaps.length !== 1 ? 's' : '');

  if (allMaps.length === 0) {
    galleryGrid.innerHTML = '<div class="gallery-empty" style="grid-column:1/-1;"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity:0.3;margin-bottom:16px;"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><p>No maps found</p></div>';
    return;
  }

  var html = '';
  allMaps.forEach(function(map) {
    html += '<div class="gallery-card" data-folder="' + map.folder + '">' +
      '<div class="gallery-card-image-wrap">' +
        '<img src="' + map.thumbnailUrl + '" class="gallery-card-image" alt="' + escapeHtml(map.name) + '" />' +
      '</div>' +
      '<div class="gallery-card-body">' +
        '<div class="gallery-card-title">' + escapeHtml(map.name) + '</div>' +
        '<div class="gallery-card-meta">' +
          '<span>by ' + escapeHtml(map.author) + '</span>' +
          (map.nations > 0 ? '<span>• ' + map.nations + ' nation' + (map.nations !== 1 ? 's' : '') + '</span>' : '') +
        '</div>' +
        (map.description ? '<div class="gallery-card-desc">' + escapeHtml(map.description) + '</div>' : '') +
      '</div>' +
    '</div>';
  });
  galleryGrid.innerHTML = html;

  document.querySelectorAll('.gallery-card').forEach(function(card) {
    card.addEventListener('click', function() {
      var folder = card.dataset.folder;
      var map = allMaps.find(function(m) { return m.folder === folder; });
      if (map) showMapDetail(map);
    });
  });
}

function showMapDetail(map) {
  currentDetailMap = map;
  document.getElementById('detailTitle').textContent = map.name;
  document.getElementById('detailImage').src = map.fullUrl;
  document.getElementById('detailAuthor').textContent = map.author;
  document.getElementById('detailSize').textContent = map.dimensions.width + ' × ' + map.dimensions.height;
  document.getElementById('detailNationsCount').textContent = map.nations;
  document.getElementById('detailDate').textContent = new Date(map.date).toLocaleDateString();
  
  var descWrap = document.getElementById('detailDescWrap');
  if (map.description) {
    document.getElementById('detailDesc').textContent = map.description;
    descWrap.style.display = 'block';
  } else {
    descWrap.style.display = 'none';
  }
  
  // Show nations toggle and list
  var hasNationsData = map.nationsData && map.nationsData.length > 0;
  showNationsToggleWrap.style.display = hasNationsData ? 'block' : 'none';
  
  var nationsListWrap = document.getElementById('detailNationsListWrap');
  var nationsList = document.getElementById('detailNationsList');
  if (hasNationsData) {
    var listHtml = '';
    map.nationsData.forEach(function(n) {
      var flagHtml = n.flag 
        ? '<img src="' + flagUrl(n.flag) + '" style="width:28px;height:18px;border-radius:2px;object-fit:cover;" onerror="this.style.display=\'none\'" />'
        : '<div style="width:28px;height:18px;border-radius:2px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:var(--accent);font-weight:600;">' + n.name.charAt(0).toUpperCase() + '</div>';
      listHtml += '<div style="display:flex;align-items:center;gap:10px;padding:8px;background:var(--surface);border-radius:6px;">' + flagHtml + '<span style="font-size:0.85rem;color:var(--text);">' + escapeHtml(n.name) + '</span></div>';
    });
    nationsList.innerHTML = listHtml;
    nationsListWrap.style.display = 'block';
  } else {
    nationsListWrap.style.display = 'none';
  }
  
  renderDetailMarkers(map);
  mapDetailModal.classList.add('open');
}

function renderDetailMarkers(map) {
  var mapWrap = document.getElementById('detailMapWrap');
  var img = document.getElementById('detailImage');
  
  mapWrap.querySelectorAll('.gallery-nation-marker').forEach(function(el) { el.remove(); });
  
  if (!showNationsOnMap || !map.nationsData || map.nationsData.length === 0) return;
  
  var render = function() {
    var imgRect = img.getBoundingClientRect();
    var scaleX = imgRect.width / map.dimensions.width;
    var scaleY = imgRect.height / map.dimensions.height;
    
    map.nationsData.forEach(function(n, i) {
      var el = document.createElement('div');
      el.className = 'gallery-nation-marker';
      el.style.cssText = 'position:absolute;left:' + (n.x * scaleX) + 'px;top:' + (n.y * scaleY) + 'px;transform:translate(-50%,-100%);pointer-events:none;z-index:10;';
      
      var flagImg = n.flag
        ? '<img src="' + flagUrl(n.flag) + '" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML=\'<span style=&quot;font-size:0.6rem;font-weight:700;color:var(--accent);&quot;>' + (i + 1) + '</span>\'" />'
        : '<span style="font-size:0.6rem;font-weight:700;color:var(--accent);">' + (i + 1) + '</span>';
      
      el.innerHTML = '<div style="width:28px;height:20px;border-radius:3px;border:2px solid rgba(255,255,255,0.9);box-shadow:0 2px 8px rgba(0,0,0,0.7);overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;">' + flagImg + '</div><div style="position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:6px solid rgba(255,255,255,0.9);"></div>';
      
      mapWrap.appendChild(el);
    });
  };
  
  if (img.complete) {
    render();
  } else {
    img.onload = render;
  }
}

// Toggle nations visibility in detail modal
detailShowNations.addEventListener('click', function() {
  showNationsOnMap = !showNationsOnMap;
  detailShowNations.classList.toggle('active', showNationsOnMap);
  if (currentDetailMap) renderDetailMarkers(currentDetailMap);
});

detailClose.addEventListener('click', function() { mapDetailModal.classList.remove('open'); });
detailClose2.addEventListener('click', function() { mapDetailModal.classList.remove('open'); });
detailDownloadBtn.addEventListener('click', function() {
